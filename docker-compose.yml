version: "3.9"
services:
  dbpelis:
    image: postgres:16
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: admindevartur
      POSTGRES_PASSWORD: A82zvm-123Y8
      POSTGRES_DB: pelisbd
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  webpelis:
    build:
      context: .
      dockerfile: ./build/apache/Dockerfile
    container_name: apache-web
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./html:/usr/local/apache2/htdocs:ro
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
